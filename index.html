<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Poke API</title>
    <link href="./css/normalize.css" rel="stylesheet"/>
    <link href="./css/style.css" rel="stylesheet"/>
    <script defer src="./js/script.js" type="module"></script>
</head>
<body>
<h2>Filtrer et trier les Pokémon :</h2>

<section id="filtre">
    <div class="select">
        <label for="select-gen">Génération :</label>
        <select id="select-gen">
            <option value="Tout">Tout</option>
            <option value="1">Génération 1</option>
            <option value="2">Génération 2</option>
            <option value="3">Génération 3</option>
            <option value="4">Génération 4</option>
            <option value="5">Génération 5</option>
            <option value="6">Génération 6</option>
            <option value="7">Génération 7</option>
            <option value="8">Génération 8</option>
            <option value="9">Génération 9</option>
        </select>
    </div>

    <div class="select">
        <label for="tri-pokemon">Trier par :</label>
        <select id="tri-pokemon">
            <option value="id">Numéro du Pokédex</option>
            <option value="nom">Nom (A-Z)</option>
            <option value="type">Type principal</option>
            <option value="total">Total des stats</option>
            <option value="hp">Points de vie</option>
            <option value="atk">Attaque</option>
            <option value="def">Défense</option>
        </select>
    </div>
</section>

<div id="types"></div>

<main></main>

</body>
</html>
